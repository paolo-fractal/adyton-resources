name: Build and Deploy Theme to WP Engine
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies and Build
        run: |
          npm install
          npm run build

      # NEW STEP: This will list all files in the action log so we can prove they are there
      - name: Debug - Verify Files Exist
        run: ls -la

      - name: Deploy Theme to WP Engine
        uses: wpengine/github-action-wpe-site-deploy@v3
        with:
          # Double-check this is the EXACT environment name you are looking at!
          WPE_ENV: 'adytoninvesdev' 
          WPE_SSHG_KEY_PRIVATE: ${{ secrets.WPE_SSH_KEY_PRIVATE }}
          
          # FIXED: Added the slash to the source path
          SRC_PATH: './' 
          REMOTE_PATH: 'wp-content/themes/adyton-resources/' 
          FLAGS: '--exclude=node_modules/ --exclude=src/ --exclude=.github/ --exclude=.git/'