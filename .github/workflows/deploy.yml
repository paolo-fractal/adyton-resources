name: Build and Deploy Theme to WP Engine
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies and Build
        run: |
          npm install
          npm run build

      - name: Deploy Theme to WP Engine
        uses: wpengine/github-action-wpe-site-deploy@v3
        with:
          # CHANGE THIS to your actual WP Engine environment name
          WPE_ENV: 'adytoninvesdev' 
          
          # Note: The action expects this specific 'SSHG' variable name
          WPE_SSHG_KEY_PRIVATE: ${{ secrets.WPE_SSH_KEY_PRIVATE }}
          
          SRC_PATH: '.' 
          REMOTE_PATH: 'wp-content/themes/adyton-resources/' 
          
          # Exclude heavy source files to keep your server lean
          FLAGS: '--exclude=node_modules/ --exclude=src/ --exclude=.github/ --exclude=.git/'